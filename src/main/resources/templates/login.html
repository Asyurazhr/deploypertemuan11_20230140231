<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Selamat Datang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#EEF6FF] min-h-screen flex items-center justify-center font-sans antialiased">

<div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl shadow-blue-100 w-full max-w-md border border-blue-100/50">

    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-gradient-to-tr from-sky-300 to-blue-200 rounded-full mx-auto flex items-center justify-center shadow-inner mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-700 tracking-tight">
            Masuk Akun
        </h1>

        <p class="text-sm text-blue-400 font-medium">
            Silahkan login untuk melanjutkan
        </p>
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">

        <div class="relative">
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Username
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </span>

                <input
                        type="text"
                        name="username"
                        placeholder="Masukkan username"
                        required
                        class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <div class="relative">
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Password
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </span>

                <input
                        type="password"
                        name="password"
                        placeholder="Masukkan password"
                        required
                        class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <button
                type="submit"
                class="w-full py-3 bg-gradient-to-r from-sky-400 to-blue-400 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:from-sky-500 hover:to-blue-500 hover:shadow-blue-300 transition duration-300 transform active:scale-95">
            LOGIN
        </button>

    </form>

    <div class="mt-8 text-center">
        <p class="text-gray-500 text-sm">
            Belum punya akun?
            <a th:href="@{/register}" class="font-bold text-blue-500 hover:text-blue-600 transition duration-200">
                Register disini
            </a>
        </p>
    </div>

</div>

</body>
</html>
