<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Buat Akun Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#EEF6FF] min-h-screen flex items-center justify-center font-sans antialiased py-10">

<div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl shadow-blue-100 w-full max-w-md border border-blue-100/50">

    <div class="text-center mb-6">
        <div class="w-20 h-20 bg-gradient-to-tr from-sky-300 to-blue-200 rounded-full mx-auto flex items-center justify-center shadow-inner mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-700 tracking-tight">
            Daftar Akun
        </h1>

        <p class="text-sm text-blue-400 font-medium">
            Lengkapi data di bawah untuk bergabung
        </p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-4">

        <div>
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Username
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </span>

                <input type="text"
                       th:field="*{username}"
                       placeholder="Username"
                       required
                       class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <div>
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Password
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </span>

                <input type="password"
                       th:field="*{password}"
                       placeholder="Password"
                       required
                       class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <div>
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Nama Lengkap
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 014 0m-6 8a2 2 0 100-4 2 2 0 000 4zm4.5-1.5a2.5 2.5 0 105 0 2.5 2.5 0 00-5 0z"/>
                    </svg>
                </span>

                <input type="text"
                       th:field="*{nama}"
                       placeholder="Nama Lengkap"
                       required
                       class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <div>
            <label class="text-xs font-semibold text-blue-500 uppercase tracking-wider ml-2">
                Alamat
            </label>

            <div class="mt-1 relative">
                <span class="absolute inset-y-0 left-0 pt-3 pl-3 flex items-start text-blue-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </span>

                <input type="text"
                       th:field="*{alamat}"
                       placeholder="Alamat Tinggal"
                       required
                       class="block w-full pl-10 pr-4 py-3 bg-blue-50 border border-blue-100 rounded-2xl text-gray-700 placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition duration-200">
            </div>
        </div>

        <div class="pt-2">
            <button
                    type="submit"
                    class="w-full py-3 bg-gradient-to-r from-sky-400 to-blue-400 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:from-sky-500 hover:to-blue-500 hover:shadow-blue-300 transition duration-300 transform active:scale-95">
                REGISTER
            </button>
        </div>

    </form>

    <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm">
            Sudah punya akun?
            <a th:href="@{/login}" class="font-bold text-blue-500 hover:text-blue-600 transition duration-200">
                Login disini
            </a>
        </p>
    </div>

</div>

</body>
</html>
